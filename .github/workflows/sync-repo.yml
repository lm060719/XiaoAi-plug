name: Sync to Xposed-Modules-Repo

on:
  push:
    branches: [ master ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  sync-commits:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force push master to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add target "https://x-access-token:${SYNC_TOKEN}@github.com/Xposed-Modules-Repo/io.mo.xiaoaiplug.git"
          git push target master --force

  sync-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push master and tags to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add target "https://x-access-token:${SYNC_TOKEN}@github.com/Xposed-Modules-Repo/io.mo.xiaoaiplug.git"
          git push target master --force
          git push target --tags --force

      - name: Sync release to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          PRERELEASE="${{ github.event.release.prerelease }}"

          # Get release body from source
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/${TAG} --jq '.body' 2>/dev/null || echo "")

          # Delete existing release on target if present
          EXISTING_ID=$(gh api repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases/tags/${TAG} --jq '.id' 2>/dev/null || echo "")
          if [ -n "$EXISTING_ID" ]; then
            gh api repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases/${EXISTING_ID} --method DELETE || true
            echo "Deleted existing release for ${TAG}"
          fi

          # Create new release on target
          gh api repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases \
            --method POST \
            -f tag_name="${TAG}" \
            -f name="${NAME}" \
            -f body="${BODY}" \
            -F prerelease="${PRERELEASE}"
