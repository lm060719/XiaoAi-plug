name: Sync to Xposed-Modules-Repo

on:
  push:
    branches: [ master ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  sync-commits:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force push master to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          GIT_ASKPASS=echo GIT_TERMINAL_PROMPT=0 git -c credential.helper= push "https://x-access-token:${SYNC_TOKEN}@github.com/Xposed-Modules-Repo/io.mo.xiaoaiplug.git" master --force

  sync-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push master and tags to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          GIT_ASKPASS=echo GIT_TERMINAL_PROMPT=0 git -c credential.helper= push "https://x-access-token:${SYNC_TOKEN}@github.com/Xposed-Modules-Repo/io.mo.xiaoaiplug.git" master --force
          GIT_ASKPASS=echo GIT_TERMINAL_PROMPT=0 git -c credential.helper= push "https://x-access-token:${SYNC_TOKEN}@github.com/Xposed-Modules-Repo/io.mo.xiaoaiplug.git" --tags --force

      - name: Sync release to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          PRERELEASE="${{ github.event.release.prerelease }}"

          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.body' 2>/dev/null || echo "")

          EXISTING_ID=$(gh api "repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases/tags/${TAG}" --jq '.id' 2>/dev/null || echo "")
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases/${EXISTING_ID}" --method DELETE || true
            echo "Deleted existing release for ${TAG}"
          fi

          gh api repos/Xposed-Modules-Repo/io.mo.xiaoaiplug/releases \
            --method POST \
            -f tag_name="${TAG}" \
            -f name="${NAME}" \
            -f body="${BODY}" \
            -F prerelease="${PRERELEASE}"
